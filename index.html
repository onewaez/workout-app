<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Gym Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #09090b;          /* Глубокий черный */
            --surface: #18181b;     /* Темно-серый для карточек */
            --border: #27272a;      /* Тонкие границы */
            --text-main: #fafafa;   /* Белый текст */
            --text-dim: #a1a1aa;    /* Приглушенный текст */
            
            /* Функциональные цвета */
            --green: #10b981;       /* Успех / Восстановление */
            --green-glow: rgba(16, 185, 129, 0.4);
            --red: #ef4444;         /* Усталость / Удаление */
            --red-glow: rgba(239, 68, 68, 0.4);
            --orange: #f59e0b;      /* Легкая усталость */
        }

        body { 
            margin: 0; padding: 0; padding-bottom: 90px; 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); color: var(--text-main); 
            -webkit-user-select: none; user-select: none;
        }

        /* Карточки */
        .card { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 16px; padding: 20px; margin: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
        }

        h1, h2, h3 { margin: 0 0 10px 0; font-weight: 600; letter-spacing: -0.5px; }
        .text-dim { color: var(--text-dim); font-size: 14px; }

        /* Кнопки */
        .btn { 
            background: var(--surface); color: var(--text-main); 
            border: 1px solid var(--border); padding: 14px; 
            border-radius: 12px; width: 100%; font-weight: 600; 
            font-size: 16px; cursor: pointer; transition: 0.2s; 
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-green { background: var(--green); color: #000; border: none; box-shadow: 0 0 15px var(--green-glow); }
        .btn-red { color: var(--red); border-color: var(--red); }
        .btn-red:hover { background: rgba(239, 68, 68, 0.1); }

        /* Инпуты */
        .input-box { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: var(--text-main); padding: 14px; border-radius: 12px; 
            margin-bottom: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: border 0.2s;
        }
        .input-box:focus { border-color: var(--green); }
        .input-box::placeholder { color: var(--text-dim); }

        /* Навигация */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(10px); 
            border-top: 1px solid var(--border); display: flex; 
            justify-content: space-around; align-items: center; 
            height: 75px; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--green); transform: translateY(-2px); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* Карта мышц */
        .heatmap-container { display: flex; justify-content: center; align-items: center; height: 380px; margin: 10px 0; }
        /* Важно для свечения: разрешаем SVG выходить за границы */
        #heatmap-wrapper svg { height: 100%; width: auto; overflow: visible !important; }

        /* Календарь */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-size: 18px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day { text-align: center; padding: 12px 0; border-radius: 10px; background: var(--bg); font-size: 15px; font-weight: 500; cursor: pointer; border: 1px solid transparent; position: relative; }
        .cal-day.selected { border-color: var(--green); background: rgba(16, 185, 129, 0.1); color: var(--green); }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin: 4px auto 0; }
        .dot.active { background: var(--green); box-shadow: 0 0 5px var(--green); }

        /* Списки и подходы */
        .list-item { background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 12px; margin-bottom: 10px; }
        .set-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
        .set-row:last-child { border-bottom: none; padding-bottom: 0; }
        
        .check-box { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .check-box.done { background: var(--green); border-color: var(--green); box-shadow: 0 0 12px var(--green-glow); }
        .check-box.done::after { content: "✓"; color: #000; font-weight: bold; font-size: 16px; }

        .row-between { display: flex; justify-content: space-between; align-items: center; }
        .del-icon { color: var(--red); cursor: pointer; padding: 5px; font-weight: bold; font-size: 20px; }

        /* Колесо */
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 20px var(--green-glow); transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .wheel-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--text-main); z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; overflow-y: auto; padding-top: 20px; }
        .page { display: none; } .page.active { display: block; animation: fade 0.2s ease-out; }
        @keyframes fade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div style="padding: 24px 20px 0;">
            <h1 id="greeting">Система активна</h1>
            <p class="text-dim">Мониторинг состояния мышц (Красный - усталость, Зеленый - готовность)</p>
        </div>

        <div class="heatmap-container" id="heatmap-wrapper">
            <p style="color: var(--red);">Загрузка SVG...</p>
        </div>

        <div class="card">
            <h3>Расчет 1ПМ</h3>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="orm-w" class="input-box" placeholder="Вес (кг)" inputmode="decimal">
                <input type="number" id="orm-r" class="input-box" placeholder="Повторы" inputmode="numeric">
            </div>
            <button class="btn btn-green" onclick="calcRM()">Вычислить максимум</button>
            <h2 id="rm-res" style="text-align: center; margin-top: 15px; color: var(--green); display: none;"></h2>
        </div>
    </div>

    <div id="plan" class="page">
        <div class="card">
            <div class="cal-header">
                <span onclick="shiftMonth(-1)" style="cursor:pointer; padding:5px;">←</span>
                <span id="month-label">Месяц</span>
                <span onclick="shiftMonth(1)" style="cursor:pointer; padding:5px;">→</span>
            </div>
            <div id="calendar" class="cal-grid"></div>
        </div>
        
        <div class="card">
            <div class="row-between" style="margin-bottom: 15px;">
                <h3 id="date-label">План на сегодня</h3>
                <span class="text-dim" style="cursor:pointer;" onclick="nav('presets')">Пресеты →</span>
            </div>
            <div id="workout-list"></div>
            <button class="btn btn-green" style="margin-top: 15px;" onclick="openModal('plan')">+ Добавить упражнение</button>
        </div>
    </div>

    <div id="presets" class="page">
        <div class="card">
            <h3>Новый шаблон</h3>
            <input type="text" id="preset-name" class="input-box" placeholder="Название (напр. Грудь + Трицепс)">
            <button class="btn btn-green" onclick="addPreset()">Сохранить шаблон</button>
        </div>
        <div id="presets-list"></div>
    </div>

    <div id="stats" class="page">
        <div class="card">
            <h3>Масса тела</h3>
            <canvas id="chartCanvas" style="margin-bottom: 20px;"></canvas>
            <input type="number" id="stat-w" class="input-box" placeholder="Записать вес (кг)" inputmode="decimal">
            <button class="btn btn-green" onclick="addWeight()">Сохранить данные</button>
        </div>
        <div class="card">
            <h3>История</h3>
            <div id="weight-history"></div>
        </div>
    </div>

    <div id="random" class="page">
        <div class="card" style="text-align: center;">
            <h3>Генератор упражнений</h3>
            <select id="wheel-m" class="input-box" onchange="drawWheel()"></select>
            
            <div style="position: relative; width: 260px; height: 260px; margin: 30px auto;">
                <div class="wheel-arrow"></div>
                <canvas id="wheelCanvas" width="260" height="260"></canvas>
            </div>
            <button class="btn btn-green" onclick="spinWheel()">Сгенерировать</button>
        </div>

        <div class="card">
            <input type="text" id="new-ex-wheel" class="input-box" placeholder="Добавить в базу колеса">
            <button class="btn" onclick="addToWheel()">Добавить</button>
            <div id="wheel-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('home', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Карта</span>
        </div>
        <div class="nav-item" onclick="nav('plan', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>План</span>
        </div>
        <div class="nav-item" onclick="nav('stats', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span>Статус</span>
        </div>
        <div class="nav-item" onclick="nav('random', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span>Рандом</span>
        </div>
    </nav>

    <div id="modal" class="modal">
        <div class="card" style="margin-top: 40px;">
            <h3>Настройка</h3>
            <select id="m-muscle" class="input-box"></select>
            <input type="text" id="m-name" class="input-box" placeholder="Название упражнения">
            
            <div id="m-sets" style="margin: 15px 0;"></div>
            <button class="btn" style="margin-bottom: 15px;" onclick="addModalSet()">+ Добавить подход</button>
            
            <button class="btn btn-green" onclick="saveEx()">Подтвердить</button>
            <button class="btn btn-red" style="margin-top: 10px;" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        // Твои точные ID мышц
        const ID_MAP = { "Грудь": "muscle-chest", "Плечи": "muscle-shoulders", "Бицепс": "muscle-biceps", "Спина": "muscle-back", "Ноги": "muscle-legs" };
        const MUSCLES = Object.keys(ID_MAP);

        let state = {
            date: new Date().toISOString().split('T')[0],
            monthDate: new Date(),
            workouts: {}, presets: [], weights: [],
            wheelData: { "Грудь": ["Жим лежа"], "Плечи": ["Махи"], "Бицепс": ["Сгибания"], "Спина": ["Тяга блока"], "Ноги": ["Присед"] }
        };

        let tempSets = [];
        let modalCtx = { type: null, id: null };
        let wheelRot = 0;
        let chartInst = null;
        let svgLoaded = false;

        window.onload = () => {
            MUSCLES.forEach(m => {
                document.getElementById('m-muscle').innerHTML += `<option value="${m}">${m}</option>`;
                document.getElementById('wheel-m').innerHTML += `<option value="${m}">${m}</option>`;
            });

            tg.CloudStorage.getItem('tacticalGym', (err, val) => {
                if(!err && val) { state = {...state, ...JSON.parse(val)}; state.monthDate = new Date(); }
                loadSVG();
                renderUI();
            });
        };

        function save() { tg.CloudStorage.setItem('tacticalGym', JSON.stringify(state)); applyColors(); }

        // --- ЛОГИКА SVG И ФУНКЦИОНАЛЬНЫХ ЦВЕТОВ ---
        async function loadSVG() {
            try {
                const r = await fetch('Muscular_systemREADY.svg');
                const t = await r.text();
                const wrapper = document.getElementById('heatmap-wrapper');
                wrapper.innerHTML = t;
                
                // Исправляем возможные проблемы с обрезкой тени в самом SVG
                const svgTag = wrapper.querySelector('svg');
                if(svgTag) {
                    svgTag.style.overflow = 'visible';
                }
                
                svgLoaded = true;
                applyColors();
            } catch (e) {
                document.getElementById('heatmap-wrapper').innerHTML = "<p style='color:var(--red)'>Ошибка: SVG не найден. Проверь имя файла.</p>";
            }
        }

        function applyColors() {
            if(!svgLoaded) return;
            
            // Базовый цвет (Сброс)
            Object.values(ID_MAP).forEach(id => {
                const el = document.getElementById(id);
                if(el) { 
                    el.style.fill = "rgba(255, 255, 255, 0.05)"; 
                    el.style.stroke = "transparent";
                    el.style.filter = "none";
                }
            });

            // Логика: 0 дней (Сегодня) = КРАСНЫЙ (Усталость)
            // 1 день назад = ОРАНЖЕВЫЙ
            // 2+ дня назад = ЗЕЛЕНЫЙ (Восстановлено)
            
            for (let i = 0; i <= 3; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dStr = d.toISOString().split('T')[0];
                
                if(state.workouts[dStr]) {
                    state.workouts[dStr].forEach(ex => {
                        const el = document.getElementById(ID_MAP[ex.muscle]);
                        if(el) {
                            el.style.transition = "all 0.5s ease";
                            if(i === 0) { // Сегодня - жестко красный
                                el.style.fill = "var(--red)";
                                // Дублируем свечение и через filter, и через stroke для надежности
                                el.style.stroke = "var(--red)";
                                el.style.strokeWidth = "2px";
                                el.style.filter = "drop-shadow(0 0 12px var(--red))";
                            } else if(i === 1) { // Вчера
                                el.style.fill = "var(--orange)";
                                el.style.stroke = "var(--orange)";
                                el.style.strokeWidth = "1px";
                                el.style.filter = "drop-shadow(0 0 8px var(--orange))";
                            } else { // Давно
                                el.style.fill = "var(--green)";
                                el.style.stroke = "transparent";
                                el.style.filter = "drop-shadow(0 0 5px var(--green))";
                            }
                        }
                    });
                }
            }
        }

        function nav(page, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
            renderUI();
        }

        // --- ПЛАН И ПОДХОДЫ ---
        function toggleSet(exI, sI) {
            state.workouts[state.date][exI].sets[sI].done = !state.workouts[state.date][exI].sets[sI].done;
            tg.HapticFeedback.selectionChanged();
            save(); renderPlan();
        }

        function renderPlan() {
            const c = document.getElementById('workout-list'); c.innerHTML = '';
            const list = state.workouts[state.date] || [];
            if(!list.length) c.innerHTML = "<p class='text-dim' style='text-align:center;'>Нет данных на сегодня</p>";
            
            list.forEach((ex, exI) => {
                let h = `<div class="list-item">
                    <div class="row-between" style="margin-bottom:12px;">
                        <b style="font-size:18px;">${ex.name}</b>
                        <span class="del-icon" onclick="delEx(${exI})">✕</span>
                    </div>`;
                ex.sets.forEach((s, sI) => {
                    h += `<div class="set-row" onclick="toggleSet(${exI}, ${sI})">
                        <span style="font-size:16px; font-weight:500;">${s.w} кг × ${s.r}</span>
                        <div class="check-box ${s.done ? 'done' : ''}"></div>
                    </div>`;
                });
                c.innerHTML += h + `</div>`;
            });
        }
        function delEx(i) { state.workouts[state.date].splice(i, 1); save(); renderPlan(); }

        // --- КАЛЕНДАРЬ ---
        function shiftMonth(dir) { state.monthDate.setMonth(state.monthDate.getMonth() + dir); renderCal(); }
        function renderCal() {
            const grid = document.getElementById('calendar'); grid.innerHTML = '';
            const m = state.monthDate.getMonth(), y = state.monthDate.getFullYear();
            document.getElementById('month-label').innerText = new Intl.DateTimeFormat('ru', {month:'long', year:'numeric'}).format(state.monthDate);
            
            let fd = new Date(y, m, 1).getDay(); fd = fd === 0 ? 6 : fd - 1;
            let days = new Date(y, m + 1, 0).getDate();

            for(let i=0; i<fd; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const el = document.createElement('div');
                el.className = `cal-day ${dStr === state.date ? 'selected' : ''}`;
                el.innerText = d;
                if(state.workouts[dStr] && state.workouts[dStr].length > 0) el.innerHTML += `<div class="dot active"></div>`;
                el.onclick = () => { state.date = dStr; renderUI(); };
                grid.appendChild(el);
            }
            document.getElementById('date-label').innerText = state.date;
        }

        // --- ПРЕСЕТЫ ---
        function addPreset() {
            const n = document.getElementById('preset-name').value;
            if(n) { state.presets.push({ id: Date.now(), name: n, ex: [] }); document.getElementById('preset-name').value = ''; save(); renderPresets(); }
        }
        function renderPresets() {
            const c = document.getElementById('presets-list'); c.innerHTML = '';
            state.presets.forEach((p, i) => {
                let h = `<div class="list-item"><h3 style="color:var(--green)">${p.name}</h3>`;
                p.ex.forEach(e => h += `<div class="text-dim" style="margin-bottom:4px;">• ${e.name}</div>`);
                h += `<div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn" style="padding:10px; font-size:14px;" onclick="openModal('preset', ${p.id})">+ Упр</button>
                    <button class="btn btn-green" style="padding:10px; font-size:14px;" onclick="usePreset(${p.id})">В план</button>
                    <button class="btn btn-red" style="padding:10px; width:50px;" onclick="state.presets.splice(${i},1); save(); renderPresets()">✕</button>
                </div></div>`;
                c.innerHTML += h;
            });
        }
        function usePreset(id) {
            const p = state.presets.find(x => x.id === id);
            if(!state.workouts[state.date]) state.workouts[state.date] = [];
            state.workouts[state.date].push(...JSON.parse(JSON.stringify(p.ex)));
            save(); nav('plan');
        }

        // --- МОДАЛКА ---
        function openModal(type, id = null) {
            modalCtx = { type, id }; tempSets = [{w: 0, r: 0}]; 
            document.getElementById('m-name').value = ''; renderModSets();
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function addModalSet() { tempSets.push({w: 0, r: 0}); renderModSets(); }
        function renderModSets() {
            document.getElementById('m-sets').innerHTML = tempSets.map((s, i) => `
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="number" class="input-box" style="margin:0" value="${s.w||''}" onchange="tempSets[${i}].w=this.value" placeholder="Вес">
                    <input type="number" class="input-box" style="margin:0" value="${s.r||''}" onchange="tempSets[${i}].r=this.value" placeholder="Повторы">
                </div>
            `).join('');
        }
        function saveEx() {
            const m = document.getElementById('m-muscle').value;
            const n = document.getElementById('m-name').value;
            if(!n) return;
            const ex = { muscle: m, name: n, sets: tempSets.map(s => ({...s, done: false})) };
            if(modalCtx.type === 'plan') {
                if(!state.workouts[state.date]) state.workouts[state.date] = [];
                state.workouts[state.date].push(ex);
            } else {
                state.presets.find(p => p.id === modalCtx.id).ex.push(ex);
            }
            save(); closeModal(); renderUI();
        }

        // --- УТИЛИТЫ (1ПМ, Статистика, Колесо) ---
        function calcRM() {
            const w = parseFloat(document.getElementById('orm-w').value);
            const r = parseFloat(document.getElementById('orm-r').value);
            const res = document.getElementById('rm-res');
            if(w && r) { res.innerText = `1ПМ: ${Math.round(w * (1 + r/30))} кг`; res.style.display = 'block'; }
        }

        function addWeight() {
            const v = parseFloat(document.getElementById('stat-w').value);
            if(v) { state.weights.push({ d: new Date().toLocaleDateString(), v }); save(); renderStats(); }
        }
        function renderStats() {
            const h = document.getElementById('weight-history'); h.innerHTML = '';
            state.weights.slice(-5).reverse().forEach(w => h.innerHTML += `<div class="set-row"><span class="text-dim">${w.d}</span><b style="color:var(--green)">${w.v} кг</b></div>`);
            
            if(chartInst) chartInst.destroy();
            Chart.defaults.color = '#a1a1aa';
            chartInst = new Chart(document.getElementById('chartCanvas'), {
                type: 'line',
                data: { labels: state.weights.map(x => x.d), datasets: [{ label: 'Вес', data: state.weights.map(x => x.v), borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.3 }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#27272a' } }, y: { grid: { color: '#27272a' } } } }
            });
        }

        function addToWheel() {
            const m = document.getElementById('wheel-m').value;
            const v = document.getElementById('new-ex-wheel').value;
            if(v) { state.wheelData[m].push(v); document.getElementById('new-ex-wheel').value = ''; save(); drawWheel(); }
        }
        function drawWheel() {
            const m = document.getElementById('wheel-m').value;
            const items = state.wheelData[m] || [];
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const r = 130; ctx.clearRect(0,0,260,260);
            
            if(!items.length) return;
            const arc = (Math.PI * 2) / items.length;
            items.forEach((text, i) => {
                ctx.beginPath(); ctx.fillStyle = i % 2 === 0 ? '#10b981' : '#059669';
                ctx.moveTo(r, r); ctx.arc(r, r, r, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(r, r); ctx.rotate(i*arc + arc/2);
                ctx.fillStyle = '#000'; ctx.font = 'bold 13px sans-serif';
                ctx.fillText(text.slice(0, 12), 50, 5); ctx.restore();
            });
            document.getElementById('wheel-list').innerHTML = items.map((x, i) => `<div class="row-between set-row"><span>${x}</span> <span class="del-icon" onclick="state.wheelData['${m}'].splice(${i},1); save(); drawWheel()">✕</span></div>`).join('');
        }
        function spinWheel() {
            wheelRot += 1800 + Math.random() * 360;
            document.getElementById('wheelCanvas').style.transform = `rotate(${wheelRot}deg)`;
            tg.HapticFeedback.impactOccurred('rigid');
        }

        function renderUI() {
            renderCal(); renderPlan(); renderPresets(); renderStats(); drawWheel(); applyColors();
        }
    </script>
</body>
</html>
