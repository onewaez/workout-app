<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Liquid Glass - FULL NEON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00f2fe; --text: #ffffff; --text-hint: rgba(255, 255, 255, 0.6);
            --danger: #ff4b4b; --bg-gradient: linear-gradient(-45deg, #141e30, #243b55, #0f2027, #203a43);
        }

        body { margin: 0; padding: 0; padding-bottom: 90px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); background: var(--bg-gradient); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; overflow-x: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        
        .btn { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); color: #000; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); margin-top: 5px; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); box-shadow: none; }

        .glass-input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); color: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .glass-input::placeholder { color: var(--text-hint); }

        .page { display: none; animation: fadeIn 0.3s ease; } .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Навигация */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 32, 39, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; height: 75px; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-hint); font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: scale(1.05); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* Карта */
        .heatmap-container { display: flex; justify-content: center; align-items: center; height: 380px; margin: 10px 0; overflow: hidden; }
        #heatmap-wrapper svg { height: 100%; width: auto; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5)); }

        /* Календарь */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { text-align: center; padding: 10px 0; border-radius: 12px; background: rgba(255,255,255,0.05); font-size: 14px; position: relative; }
        .cal-day.selected { background: var(--accent); color: #000; font-weight: bold; }
        .dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin: 2px auto 0; }

        .set-row { background: rgba(0,0,0,0.15); padding: 14px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .check-box { width: 26px; height: 26px; border: 2px solid var(--accent); border-radius: 50%; transition: 0.3s; }
        .check-box.done { background: var(--accent); box-shadow: 0 0 15px var(--accent); border-color: #fff; }

        /* Колесо */
        #wheelCanvas { border-radius: 50%; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 3000; overflow-y: auto; }
        .row-between { display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: var(--danger); font-weight: bold; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div style="padding: 20px 20px 0;">
            <h1 id="greeting" style="margin:0; font-size: 26px;">Привет, Атлет!</h1>
            <p style="color: var(--text-hint); margin-top: 5px;">Твой статус восстановления</p>
        </div>

        <div class="heatmap-container" id="heatmap-wrapper">
            <p>Загрузка системы...</p>
        </div>

        <div class="glass-card">
            <h3>Инсайт дня</h3>
            <p id="daily-quote" style="font-style: italic; color: var(--accent);"></p>
        </div>

        <div class="glass-card">
            <h3>Калькулятор 1ПМ</h3>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="orm-weight" class="glass-input" placeholder="Вес (кг)" inputmode="decimal">
                <input type="number" id="orm-reps" class="glass-input" placeholder="Повторы" inputmode="numeric">
            </div>
            <button class="btn btn-outline" onclick="calculate1RM()">Рассчитать</button>
            <p id="orm-result" style="text-align: center; font-weight: bold; margin-top: 10px; font-size: 18px;"></p>
        </div>
    </div>

    <div id="plan" class="page">
        <div class="glass-card">
            <div class="row-between" style="margin-bottom: 15px;">
                <button class="btn-outline" style="padding: 5px 15px; border-radius: 8px;" onclick="changeMonth(-1)">‹</button>
                <span id="month-label" style="font-weight: bold;">Мартовский цикл</span>
                <button class="btn-outline" style="padding: 5px 15px; border-radius: 8px;" onclick="changeMonth(1)">›</button>
            </div>
            <div id="calendar" class="cal-grid"></div>
        </div>
        
        <div class="glass-card">
            <h3 id="selected-date-label">План на сегодня</h3>
            <div id="workout-list"></div>
            <button class="btn" onclick="openExModal('plan')">+ Добавить упражнение</button>
            <button class="btn btn-outline" style="margin-top: 10px;" onclick="nav('presets')">📋 Мои Пресеты</button>
        </div>
    </div>

    <div id="presets" class="page">
        <div class="glass-card">
            <h3>Создать шаблон</h3>
            <input type="text" id="preset-name" class="glass-input" placeholder="Название (напр. Спина/Плечи)">
            <button class="btn" onclick="createPreset()">Создать пресет</button>
        </div>
        <div id="presets-list"></div>
        <div style="padding: 0 15px;"><button class="btn btn-outline" onclick="nav('plan')">← Вернуться к календарю</button></div>
    </div>

    <div id="stats" class="page">
        <div class="glass-card">
            <h3>Прогресс веса</h3>
            <canvas id="weightChart" style="margin-bottom: 15px;"></canvas>
            <input type="number" id="stat-weight-input" class="glass-input" placeholder="Сегодняшний вес (кг)" inputmode="decimal">
            <button class="btn" onclick="addWeight()">Сохранить вес</button>
        </div>
        <div class="glass-card">
            <h3>История измерений</h3>
            <div id="weight-history"></div>
        </div>
    </div>

    <div id="random" class="page">
        <div class="glass-card" style="text-align: center;">
            <h3>Колесо упражнений</h3>
            <select id="wheel-muscle" class="glass-input" onchange="drawWheel()"></select>
            
            <div style="position: relative; width: 250px; height: 250px; margin: 20px auto;">
                <div style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--accent); z-index: 10;"></div>
                <canvas id="wheelCanvas" width="250" height="250"></canvas>
            </div>
            
            <button class="btn" onclick="spinWheel()">Крутить удачу!</button>
        </div>

        <div class="glass-card">
            <input type="text" id="new-wheel-ex" class="glass-input" placeholder="Добавить свое упр.">
            <button class="btn btn-outline" onclick="addExToWheel()">Добавить в список</button>
            <div id="wheel-items-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('home', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="nav('plan', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>
            <span>План</span>
        </div>
        <div class="nav-item" onclick="nav('stats', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"></path></svg>
            <span>Статистика</span>
        </div>
        <div class="nav-item" onclick="nav('random', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
            <span>Рандом</span>
        </div>
    </nav>

    <div id="ex-modal" class="modal">
        <div class="glass-card" style="margin-top: 50px;">
            <h3>Настройка упражнения</h3>
            <select id="modal-muscle" class="glass-input"></select>
            <input type="text" id="modal-ex-name" class="glass-input" placeholder="Название">
            
            <div id="sets-editor" style="margin: 15px 0;"></div>
            <button class="btn btn-outline" style="margin-bottom: 15px;" onclick="addSetToEditor()">+ Добавить подход</button>
            
            <button class="btn" onclick="saveExercise()">Сохранить</button>
            <button class="btn" style="background: var(--danger); color: #fff; margin-top: 10px;" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const MUSCLES = ["Грудь", "Плечи", "Бицепс", "Спина", "Ноги"];
        const ID_MAP = { "Грудь": "muscle-chest", "Плечи": "muscle-shoulders", "Бицепс": "muscle-biceps", "Спина": "muscle-back", "Ноги": "muscle-legs" };
        const QUOTES = ["Завтра ты скажешь себе спасибо.", "Боль временна, триумф вечен.", "Дисциплина — это выбор между тем, чего ты хочешь сейчас, и тем, чего ты хочешь больше всего."];

        let state = {
            selectedDate: new Date().toISOString().split('T')[0],
            curMonth: new Date(),
            workouts: {},
            presets: [],
            weights: [],
            wheelLib: { "Грудь": ["Жим лежа", "Разводка"], "Плечи": ["Жим гантелей"], "Бицепс": ["ПШБ"], "Спина": ["Подтягивания"], "Ноги": ["Приседания"] }
        };

        let isSvgLoaded = false;
        let tempSets = [];
        let editContext = { type: null, targetId: null };
        let currentRotation = 0;
        let chart = null;

        window.onload = () => {
            document.getElementById('daily-quote').innerText = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            MUSCLES.forEach(m => {
                document.getElementById('modal-muscle').innerHTML += `<option value="${m}">${m}</option>`;
                document.getElementById('wheel-muscle').innerHTML += `<option value="${m}">${m}</option>`;
            });

            tg.CloudStorage.getItem('gymUltraSave', (err, val) => {
                if(!err && val) {
                    const saved = JSON.parse(val);
                    state = {...state, ...saved};
                    state.curMonth = new Date();
                }
                loadSVG();
                renderAll();
            });
        };

        function save() {
            tg.CloudStorage.setItem('gymUltraSave', JSON.stringify(state));
            applyMuscleGlow();
        }

        async function loadSVG() {
            try {
                const resp = await fetch('Muscular_systemREADY.svg');
                const text = await resp.text();
                document.getElementById('heatmap-wrapper').innerHTML = text;
                isSvgLoaded = true;
                applyMuscleGlow();
            } catch (e) {
                document.getElementById('heatmap-wrapper').innerHTML = "<p style='color:red'>SVG файл не найден!</p>";
            }
        }

        function applyMuscleGlow() {
            if(!isSvgLoaded) return;
            
            // Очистка всех ID перед покраской
            Object.values(ID_MAP).forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.style.fill = "rgba(255,255,255,0.05)"; el.style.filter = "none"; }
            });

            // Логика: проверяем последние 3 дня
            for (let i = 0; i <= 3; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dStr = d.toISOString().split('T')[0];
                if(state.workouts[dStr]) {
                    state.workouts[dStr].forEach(ex => {
                        const pathId = ID_MAP[ex.muscle];
                        const el = document.getElementById(pathId);
                        if(el) {
                            if(i === 0) { // Сегодняшняя тренировка - Максимальный Неон
                                el.style.fill = "rgba(255, 75, 75, 0.9)";
                                el.style.filter = "drop-shadow(0 0 5px #ff4b4b) drop-shadow(0 0 15px #ff4b4b)";
                            } else if(i === 1) { // Вчера
                                el.style.fill = "rgba(255, 165, 0, 0.8)";
                                el.style.filter = "drop-shadow(0 0 8px #ffa500)";
                            } else { // 2-3 дня назад
                                el.style.fill = "rgba(0, 242, 254, 0.6)";
                                el.style.filter = "drop-shadow(0 0 5px #00f2fe)";
                            }
                            el.style.transition = "all 0.8s ease";
                        }
                    });
                }
            }
        }

        function nav(pageId, el = null) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
            renderAll();
        }

        // --- ЛОГИКА ТРЕНИРОВОК (Без таймера) ---
        function toggleSet(exIdx, sIdx) {
            state.workouts[state.selectedDate][exIdx].sets[sIdx].done = !state.workouts[state.selectedDate][exIdx].sets[sIdx].done;
            tg.HapticFeedback.selectionChanged();
            save();
            renderPlan();
        }

        function renderPlan() {
            const cont = document.getElementById('workout-list'); cont.innerHTML = '';
            const list = state.workouts[state.selectedDate] || [];
            if(!list.length) cont.innerHTML = "<p style='text-align:center; color:var(--text-hint)'>На этот день планов нет</p>";
            
            list.forEach((ex, ei) => {
                let html = `<div class="glass-card" style="margin: 10px 0; padding: 15px;">
                    <div class="row-between"><b>${ex.muscle}: ${ex.name}</b> <span class="delete-btn" onclick="deleteEx(${ei})">✕</span></div><br>`;
                ex.sets.forEach((s, si) => {
                    html += `<div class="set-row" onclick="toggleSet(${ei}, ${si})">
                        <span>Сет ${si+1}: ${s.w} кг x ${s.r}</span>
                        <div class="check-box ${s.done ? 'done' : ''}"></div>
                    </div>`;
                });
                cont.innerHTML += html + `</div>`;
            });
        }

        function deleteEx(idx) { state.workouts[state.selectedDate].splice(idx, 1); save(); renderPlan(); }

        // --- ПРЕСЕТЫ ---
        function createPreset() {
            const n = document.getElementById('preset-name').value;
            if(n) { state.presets.push({ id: Date.now(), name: n, ex: [] }); document.getElementById('preset-name').value = ''; save(); renderPresets(); }
        }
        function renderPresets() {
            const cont = document.getElementById('presets-list'); cont.innerHTML = '';
            state.presets.forEach((p, pi) => {
                let h = `<div class="glass-card"><h4>${p.name}</h4>`;
                p.ex.forEach(e => h += `<div style="font-size:12px; color:var(--text-hint)">• ${e.name}</div>`);
                h += `<div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn btn-outline" style="font-size:12px" onclick="openExModal('preset', ${p.id})">+ Упр.</button>
                    <button class="btn" style="font-size:12px" onclick="applyPreset(${p.id})">В план</button>
                    <button class="btn" style="background:var(--danger); width:40px;" onclick="state.presets.splice(${pi},1); save(); renderPresets()">✕</button>
                </div></div>`;
                cont.innerHTML += h;
            });
        }
        function applyPreset(pid) {
            const p = state.presets.find(x => x.id === pid);
            if(!state.workouts[state.selectedDate]) state.workouts[state.selectedDate] = [];
            state.workouts[state.selectedDate].push(...JSON.parse(JSON.stringify(p.ex)));
            save(); nav('plan');
        }

        // --- СТАТИСТИКА ---
        function addWeight() {
            const val = parseFloat(document.getElementById('stat-weight-input').value);
            if(val) { state.weights.push({ date: new Date().toLocaleDateString(), val: val }); save(); renderStats(); }
        }
        function renderStats() {
            const h = document.getElementById('weight-history'); h.innerHTML = '';
            state.weights.slice(-5).reverse().forEach(w => h.innerHTML += `<div class="set-row"><span>${w.date}</span><b>${w.val} кг</b></div>`);
            
            if(chart) chart.destroy();
            chart = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: {
                    labels: state.weights.map(x => x.date),
                    datasets: [{ label: 'Вес', data: state.weights.map(x => x.val), borderColor: '#00f2fe', tension: 0.3 }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        // --- КОЛЕСО ---
        function addExToWheel() {
            const m = document.getElementById('wheel-muscle').value;
            const val = document.getElementById('new-wheel-ex').value;
            if(val) { state.wheelLib[m].push(val); document.getElementById('new-wheel-ex').value = ''; save(); drawWheel(); }
        }
        function drawWheel() {
            const m = document.getElementById('wheel-muscle').value;
            const items = state.wheelLib[m];
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const r = canvas.width / 2; ctx.clearRect(0,0,300,300);
            
            if(!items.length) return;
            const arc = (Math.PI * 2) / items.length;
            items.forEach((text, i) => {
                ctx.beginPath(); ctx.fillStyle = i % 2 === 0 ? '#00f2fe' : '#4facfe';
                ctx.moveTo(r, r); ctx.arc(r, r, r, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(r, r); ctx.rotate(i*arc + arc/2);
                ctx.fillStyle = '#000'; ctx.font = 'bold 12px sans-serif';
                ctx.fillText(text.slice(0, 10), 60, 5); ctx.restore();
            });
            
            document.getElementById('wheel-items-list').innerHTML = items.map((x, i) => `<div class="row-between">${x} <span class="delete-btn" onclick="state.wheelLib['${m}'].splice(${i},1); save(); drawWheel()">✕</span></div>`).join('');
        }
        function spinWheel() {
            currentRotation += 1800 + Math.random() * 360;
            document.getElementById('wheelCanvas').style.transform = `rotate(${currentRotation}deg)`;
            tg.HapticFeedback.impactOccurred('medium');
        }

        // --- МОДАЛКА И ВСПОМОГАТЕЛЬНОЕ ---
        function openExModal(type, targetId = null) {
            editContext = { type, targetId };
            tempSets = [{w: 20, r: 10}];
            document.getElementById('modal-ex-name').value = '';
            renderSetsEditor();
            document.getElementById('ex-modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('ex-modal').style.display = 'none'; }
        function addSetToEditor() { tempSets.push({w: 20, r: 10}); renderSetsEditor(); }
        function renderSetsEditor() {
            document.getElementById('sets-editor').innerHTML = tempSets.map((s, i) => `
                <div style="display:flex; gap:10px; margin-bottom:5px;">
                    <input type="number" class="glass-input" value="${s.w}" onchange="tempSets[${i}].w=this.value" placeholder="кг">
                    <input type="number" class="glass-input" value="${s.r}" onchange="tempSets[${i}].r=this.value" placeholder="повт">
                </div>
            `).join('');
        }
        function saveExercise() {
            const m = document.getElementById('modal-muscle').value;
            const n = document.getElementById('modal-ex-name').value;
            if(!n) return;
            const ex = { muscle: m, name: n, sets: tempSets.map(s => ({...s, done: false})) };
            if(editContext.type === 'plan') {
                if(!state.workouts[state.selectedDate]) state.workouts[state.selectedDate] = [];
                state.workouts[state.selectedDate].push(ex);
            } else {
                state.presets.find(p => p.id === editContext.targetId).ex.push(ex);
            }
            save(); closeModal(); renderAll();
        }

        function calculate1RM() {
            const w = parseFloat(document.getElementById('orm-weight').value);
            const r = parseFloat(document.getElementById('orm-reps').value);
            if(w && r) document.getElementById('orm-result').innerText = `Твой максимум: ${Math.round(w * (1 + r/30))} кг`;
        }

        function changeMonth(dir) { state.curMonth.setMonth(state.curMonth.getMonth() + dir); renderCalendar(); }
        function renderCalendar() {
            const grid = document.getElementById('calendar'); grid.innerHTML = '';
            const m = state.curMonth.getMonth(), y = state.curMonth.getFullYear();
            document.getElementById('month-label').innerText = new Intl.DateTimeFormat('ru', {month:'long', year:'numeric'}).format(state.curMonth);
            let firstDay = new Date(y, m, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
            let daysInMonth = new Date(y, m + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=daysInMonth; d++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const el = document.createElement('div');
                el.className = `cal-day ${dStr === state.selectedDate ? 'selected' : ''}`;
                el.innerText = d;
                if(state.workouts[dStr]) el.innerHTML += `<div class="dot"></div>`;
                el.onclick = () => { state.selectedDate = dStr; renderAll(); };
                grid.appendChild(el);
            }
            document.getElementById('selected-date-label').innerText = `План на ${state.selectedDate}`;
        }

        function renderAll() {
            renderCalendar();
            renderPlan();
            renderPresets();
            renderStats();
            drawWheel();
            applyMuscleGlow();
        }
    </script>
</body>
</html>
