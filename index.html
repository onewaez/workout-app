<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLATE | Strength Architecture</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f1115;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1; /* Indigo */
            --accent-soft: rgba(99, 102, 241, 0.2);
            --text: #f4f4f5;
            --text-dim: #71717a;
            --safe: #a3e635; /* Sage */
            --danger: #fb7185; /* Rose */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5; padding-bottom: 100px; overflow-x: hidden;
        }

        /* Glassmorphism */
        .glass {
            background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
        }

        .container { padding: 16px; }
        h1 { font-size: 26px; font-weight: 700; letter-spacing: -1px; margin: 0; }
        .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); font-weight: 700; margin-bottom: 8px; display: block; }

        /* Кнопки */
        .btn {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 14px 20px; border-radius: 16px; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--accent); color: white; border: none; box-shadow: 0 4px 15px var(--accent-soft); }
        .btn:active { transform: scale(0.97); }

        .input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            color: white; padding: 14px; border-radius: 14px; outline: none; font-size: 16px;
        }

        /* Календарь Grid */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s;
            border: 1px solid transparent;
        }
        .cal-day.other { color: var(--text-dim); opacity: 0.3; }
        .cal-day.active { background: var(--accent); color: white; font-weight: 700; }
        .cal-day.has-w { border-color: var(--accent); color: var(--accent); }

        /* Навигация */
        .nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(15, 17, 21, 0.8); backdrop-filter: blur(25px);
            border: 1px solid var(--border); height: 70px; border-radius: 24px;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: var(--text-dim); font-size: 10px; font-weight: 700; text-transform: uppercase; text-align: center; }
        .nav-item.active { color: var(--accent); }

        /* Кольца */
        .rec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .rec-circle {
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--border);
            margin: 0 auto 8px; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800;
        }

        /* Модалка */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; overflow-y: auto; }

        .page { display: none; }
        .page.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="container">
            <span class="label">Организм</span>
            <h1>Recovery</h1>
            <div class="glass" style="padding: 20px; margin-top: 12px;">
                <div class="rec-grid" id="rec-grid"></div>
            </div>

            <span class="label" style="margin-top: 24px;">Аналитика веса</span>
            <div class="glass" style="padding: 20px; margin-top: 12px;">
                <canvas id="weightChart" style="height: 150px;"></canvas>
                <div style="display:flex; justify-content:space-between; margin-top:15px">
                    <h2 id="cur-w" style="margin:0">0 kg</h2>
                    <span class="label" id="goal-w">Цель: 0 kg</span>
                </div>
            </div>
        </div>
    </div>

    <div id="plan" class="page">
        <div class="container">
            <div class="glass" style="padding: 16px;">
                <div class="cal-header">
                    <button class="btn" style="padding: 8px" onclick="shiftMonth(-1)">←</button>
                    <h2 id="month-label" style="margin:0; font-size: 18px;">Март 2026</h2>
                    <button class="btn" style="padding: 8px" onclick="shiftMonth(1)">→</button>
                </div>
                <div class="cal-grid" id="cal-grid"></div>
            </div>

            <div style="margin-top: 24px;">
                <span class="label" id="date-focus">6 Марта</span>
                <div id="workout-list"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-primary" onclick="openModal('add')">+ Упр.</button>
                    <button class="btn" onclick="openModal('presets')">Пресеты</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="container">
            <h1>Settings</h1>
            <div class="glass" style="padding: 20px; margin-top: 16px;">
                <span class="label">Цель по весу</span>
                <input type="number" id="goal-in" class="input" placeholder="Введите кг" onchange="updateGoal(this.value)">
                
                <span class="label" style="margin-top:20px">Добавить вес в лог</span>
                <div style="display:flex; gap:8px">
                    <input type="date" id="w-date" class="input">
                    <input type="number" id="w-val" class="input" placeholder="кг">
                </div>
                <button class="btn btn-primary" style="width:100%; margin-top:12px" onclick="saveWeight()">Сохранить вес</button>
            </div>

            <div class="glass" style="padding: 20px; margin-top: 16px;">
                <span class="label">Рекорды</span>
                <div id="pb-list"></div>
                <button class="btn" style="width:100%; margin-top:10px" onclick="addPB()">+ Записать рекорд</button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div id="modal-body"></div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="nav('home', this)">Dash</div>
        <div class="nav-item" onclick="nav('plan', this)">Plan</div>
        <div class="nav-item" onclick="nav('settings', this)">Settings</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const MUSCLES = ["Грудь", "Спина", "Ноги", "Плечи", "Бицепс", "Трицепс"];
        
        let state = {
            focusDate: new Date().toISOString().split('T')[0],
            monthDate: new Date(),
            workouts: {}, presets: [], weightLogs: {}, weightGoal: 0, pbs: []
        };

        window.onload = () => {
            document.getElementById('w-date').value = state.focusDate;
            tg.CloudStorage.getItem('slateState', (err, val) => {
                if(!err && val) state = {...state, ...JSON.parse(val)};
                state.monthDate = new Date(); // Сброс на текущий месяц
                renderAll();
            });
        };

        function save() { tg.CloudStorage.setItem('slateState', JSON.stringify(state)); renderAll(); }

        // --- КАЛЕНДАРЬ ---
        function shiftMonth(dir) { state.monthDate.setMonth(state.monthDate.getMonth() + dir); renderCal(); }
        function renderCal() {
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            const m = state.monthDate.getMonth(), y = state.monthDate.getFullYear();
            document.getElementById('month-label').innerText = new Intl.DateTimeFormat('ru', {month:'long', year:'numeric'}).format(state.monthDate);
            
            let firstDay = new Date(y, m, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
            let lastDate = new Date(y, m + 1, 0).getDate();
            let prevLastDate = new Date(y, m, 0).getDate();

            for(let i=firstDay; i>0; i--) {
                grid.innerHTML += `<div class="cal-day other">${prevLastDate-i+1}</div>`;
            }
            for(let d=1; d<=lastDate; d++) {
                let dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let hasW = state.workouts[dStr]?.length;
                grid.innerHTML += `<div class="cal-day ${dStr === state.focusDate ? 'active' : ''} ${hasW ? 'has-w' : ''}" onclick="state.focusDate='${dStr}'; save();">${d}</div>`;
            }
            document.getElementById('date-focus').innerText = state.focusDate;
        }

        // --- ВОССТАНОВЛЕНИЕ ---
        function renderRec() {
            const grid = document.getElementById('rec-grid'); grid.innerHTML = '';
            const today = new Date(); today.setHours(0,0,0,0);
            MUSCLES.forEach(m => {
                let lastDays = 99;
                for(let d in state.workouts) {
                    if(state.workouts[d].some(ex => ex.muscle === m)) {
                        let diff = Math.ceil(Math.abs(today - new Date(d)) / 86400000);
                        if(diff < lastDays) lastDays = diff;
                    }
                }
                let pct = lastDays >= 3 ? 100 : (lastDays === 2 ? 66 : (lastDays === 1 ? 33 : 0));
                let color = pct > 60 ? 'var(--safe)' : (pct > 30 ? 'orange' : 'var(--danger)');
                grid.innerHTML += `
                    <div style="text-align:center">
                        <div class="rec-circle" style="border-color: ${color}; color: ${color}">${pct}%</div>
                        <span style="font-size:9px; color:var(--text-dim); text-transform:uppercase">${m}</span>
                    </div>`;
            });
        }

        // --- ПРЕСЕТЫ И ТРЕНИРОВКИ ---
        function openModal(mode) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal').style.display = 'block';
            if(mode === 'add') {
                body.innerHTML = `
                    <div class="glass" style="padding:20px">
                        <h2>Добавить</h2>
                        <select id="m-m" class="input" style="margin-bottom:10px">${MUSCLES.map(m => `<option>${m}</option>`).join('')}</select>
                        <input type="text" id="m-n" class="input" placeholder="Упражнение">
                        <div id="m-sets" style="margin:15px 0"></div>
                        <button class="btn" style="width:100%" onclick="addSetField()">+ Подход</button>
                        <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="saveEx()">В план</button>
                        <button class="btn" style="width:100%; margin-top:8px" onclick="closeModal()">Отмена</button>
                    </div>`;
            } else if(mode === 'presets') {
                body.innerHTML = `
                    <div class="glass" style="padding:20px">
                        <h2>Пресеты</h2>
                        <input type="text" id="pre-n" class="input" placeholder="Название (н-р: Спина)">
                        <button class="btn btn-primary" style="width:100%; margin:10px 0" onclick="createPreset()">Создать из плана дня</button>
                        <div id="pre-list"></div>
                        <button class="btn" style="width:100%; margin-top:10px" onclick="closeModal()">Закрыть</button>
                    </div>`;
                renderPresetList();
            }
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function addSetField() { document.getElementById('m-sets').innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px"><input type="number" class="input sw" placeholder="кг"><input type="number" class="input sr" placeholder="раз"></div>`; }
        
        function saveEx() {
            const muscle = document.getElementById('m-m').value;
            const name = document.getElementById('m-n').value;
            const sets = Array.from(document.querySelectorAll('#m-sets > div')).map(d => ({ w: d.querySelector('.sw').value, r: d.querySelector('.sr').value }));
            if(!state.workouts[state.focusDate]) state.workouts[state.focusDate] = [];
            state.workouts[state.focusDate].push({ muscle, name, sets });
            save(); closeModal();
        }

        function createPreset() {
            const name = document.getElementById('pre-n').value;
            const currentWorkouts = state.workouts[state.focusDate] || [];
            if(name && currentWorkouts.length) {
                state.presets.push({ id: Date.now(), name, exercises: JSON.parse(JSON.stringify(currentWorkouts)) });
                save(); renderPresetList();
            }
        }
        function renderPresetList() {
            document.getElementById('pre-list').innerHTML = state.presets.map(p => `
                <div class="glass" style="padding:15px; margin-top:10px; display:flex; justify-content:space-between; align-items:center">
                    <div><b>${p.name}</b><br><small>${p.exercises.length} упр.</small></div>
                    <div style="display:flex; gap:5px">
                        <button class="btn btn-primary" style="padding:8px 12px" onclick="applyPreset(${p.id})">Применить</button>
                        <button class="btn" style="padding:8px" onclick="deletePreset(${p.id})">✕</button>
                    </div>
                </div>`).join('');
        }
        function applyPreset(id) {
            const p = state.presets.find(x => x.id === id);
            if(!state.workouts[state.focusDate]) state.workouts[state.focusDate] = [];
            state.workouts[state.focusDate].push(...JSON.parse(JSON.stringify(p.exercises)));
            save(); closeModal();
        }
        function deletePreset(id) { state.presets = state.presets.filter(x => x.id !== id); save(); renderPresetList(); }

        // --- ВЕС ---
        function updateGoal(v) { state.weightGoal = v; save(); }
        function saveWeight() {
            const d = document.getElementById('w-date').value, v = document.getElementById('w-val').value;
            if(d && v) { state.weightLogs[d] = v; save(); }
        }
        
        let chart;
        function renderChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if(chart) chart.destroy();
            const keys = Object.keys(state.weightLogs).sort();
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: keys, datasets: [{ data: keys.map(k => state.weightLogs[k]), borderColor: '#6366f1', tension: 0.4, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)' }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#71717a' }, grid: { display: false } } } }
            });
            const lastW = state.weightLogs[keys[keys.length-1]] || 0;
            document.getElementById('cur-w').innerText = lastW + " kg";
            document.getElementById('goal-w').innerText = "Цель: " + state.weightGoal + " kg";
        }

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
        }

        function renderAll() {
            renderCal(); renderRec(); renderChart();
            const list = state.workouts[state.focusDate] || [];
            document.getElementById('workout-list').innerHTML = list.map((ex, i) => `
                <div class="glass" style="padding:15px; margin-top:10px">
                    <div style="display:flex; justify-content:space-between">
                        <b>${ex.name}</b> <span onclick="state.workouts['${state.focusDate}'].splice(${i},1); save();">✕</span>
                    </div>
                    <div class="label" style="margin-bottom:0">${ex.muscle}</div>
                </div>`).join('');
        }
    </script>
</body>
</html>
