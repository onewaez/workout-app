<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIQUID CORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: var(--bg-gradient); background-attachment: fixed;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            color: var(--text); overflow-x: hidden; padding-bottom: 100px;
        }

        /* Эффект Liquid Glass */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px; margin: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin: 0 0 10px 0; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-text { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }

        /* Кнопки */
        .btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            color: #fff; padding: 14px; border-radius: 16px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); background: var(--glass-border); }
        .btn-accent { background: var(--accent); color: #000; border: none; box-shadow: 0 0 20px var(--accent-glow); }

        .input-box {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            color: #fff; padding: 14px; border-radius: 12px; outline: none; font-size: 16px;
        }

        /* Навигация */
        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); height: 70px;
            border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-btn { color: rgba(255,255,255,0.3); transition: 0.3s; padding: 10px; }
        .nav-btn.active { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }

        /* Кольца восстановления */
        .recovery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .muscle-unit { text-align: center; }
        .circle-box {
            position: relative; width: 60px; height: 60px; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
        }
        svg.progress-ring { transform: rotate(-90deg); width: 60px; height: 60px; }
        .progress-ring__circle {
            stroke-dasharray: 157; stroke-dashoffset: 157;
            transition: stroke-dashoffset 1s ease; stroke-linecap: round;
        }

        /* Цель по весу (Колба) */
        .goal-container { position: relative; height: 40px; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; margin: 15px 0; border: 1px solid var(--glass-border); }
        .goal-fill { 
            height: 100%; background: linear-gradient(90deg, var(--accent), #00ff88); 
            box-shadow: 0 0 15px var(--accent-glow); transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Календарь */
        .cal-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .cal-dot { 
            width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            background: var(--glass); border: 1px solid var(--glass-border); font-size: 14px;
        }
        .cal-dot.active { background: var(--accent); color: #000; font-weight: bold; }
        .cal-dot.has-event { border-bottom: 3px solid var(--accent); }

        .page { display: none; animation: pageIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal { 
            display: none; position: fixed; inset: 0; z-index: 2000; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 20px;
        }

        .record-badge { background: rgba(255, 215, 0, 0.1); border: 1px solid gold; color: gold; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="glass-card">
            <span class="sub-text">Системный мониторинг</span>
            <h1>Recovery Status</h1>
            <div class="recovery-grid" id="recovery-display"></div>
        </div>

        <div class="glass-card">
            <span class="sub-text">Силовые рекорды</span>
            <h1 style="margin-bottom:15px">PB Vault</h1>
            <div id="pb-list"></div>
            <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="openModal('pb')">+ Записать рекорд</button>
        </div>
    </div>

    <div id="train" class="page">
        <div class="glass-card">
            <div class="cal-row" id="cal-strip"></div>
            <h1 id="selected-date-label">Сегодня</h1>
        </div>
        
        <div id="workout-container"></div>
        
        <div style="padding: 0 16px;">
            <button class="btn btn-accent" style="width:100%" onclick="openModal('workout')">Добавить упражнение</button>
        </div>

        <div class="glass-card" style="margin-top:20px">
            <span class="sub-text">Генератор нагрузки</span>
            <select id="rnd-muscle" class="input-box" style="margin: 10px 0" onchange="updateRndList()"></select>
            <div id="rnd-result" style="font-size: 20px; font-weight: 800; color: var(--accent); text-align: center; margin: 15px 0; min-height: 24px;"></div>
            <button class="btn btn-outline" style="width:100%" onclick="spinRnd()">Сгенерировать вектор</button>
            <div id="rnd-config-list" style="margin-top:15px"></div>
            <input type="text" id="rnd-new-name" class="input-box" placeholder="Новое упражнение" style="margin-top:10px">
            <button class="btn" style="width:100%; margin-top:5px" onclick="addRndEx()">+ В базу</button>
        </div>
    </div>

    <div id="body" class="page">
        <div class="glass-card">
            <span class="sub-text">Целевой вес</span>
            <div style="display:flex; justify-content:space-between; align-items:flex-end">
                <h1 id="cur-weight-display">0 kg</h1>
                <span class="sub-text" id="goal-weight-display">Цель: 0 kg</span>
            </div>
            <div class="goal-container"><div id="goal-fill" class="goal-fill"></div></div>
            <input type="number" id="set-goal" class="input-box" placeholder="Установить цель (кг)" onchange="setGoal(this.value)">
        </div>

        <div class="glass-card">
            <span class="sub-text">Лог массы</span>
            <div style="display:flex; gap:8px; margin:15px 0">
                <input type="date" id="w-date" class="input-box">
                <input type="number" id="w-val" class="input-box" placeholder="кг">
            </div>
            <button class="btn btn-accent" style="width:100%" onclick="saveWeight()">Зафиксировать</button>
        </div>

        <canvas id="weightChart" class="glass-card" style="width: calc(100% - 32px); max-height: 200px;"></canvas>

        <div id="weight-history" style="padding: 0 16px"></div>
    </div>

    <div id="modal" class="modal">
        <div class="glass-card" id="modal-content"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-btn active" onclick="nav('home', this)">Status</div>
        <div class="nav-btn" onclick="nav('train', this)">Train</div>
        <div class="nav-btn" onclick="nav('body', this)">Body</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const MUSCLES = ["Грудь", "Спина", "Ноги", "Плечи", "Бицепс", "Трицепс", "Пресс"];
        
        let state = {
            viewDate: new Date().toISOString().split('T')[0],
            workouts: {}, weightLogs: {}, weightGoal: 0,
            pbVault: [], 
            rndData: { "Грудь": ["Жим лежа"], "Спина": ["Подтягивания"], "Ноги": ["Приседания"] }
        };

        window.onload = () => {
            document.getElementById('w-date').value = state.viewDate;
            MUSCLES.forEach(m => {
                document.getElementById('rnd-muscle').innerHTML += `<option value="${m}">${m}</option>`;
                if(!state.rndData[m]) state.rndData[m] = [];
            });
            tg.CloudStorage.getItem('liquidState', (err, val) => {
                if(!err && val) state = {...state, ...JSON.parse(val)};
                renderAll();
            });
        };

        function save() { tg.CloudStorage.setItem('liquidState', JSON.stringify(state)); renderAll(); }

        // --- RECOVERY LOGIC ---
        function renderRecovery() {
            const container = document.getElementById('recovery-display');
            container.innerHTML = '';
            const today = new Date(); today.setHours(0,0,0,0);

            MUSCLES.forEach(m => {
                let lastDays = 99;
                for(let d in state.workouts) {
                    if(state.workouts[d].some(ex => ex.muscle === m)) {
                        let diff = Math.ceil(Math.abs(today - new Date(d)) / 86400000);
                        if(diff < lastDays) lastDays = diff;
                    }
                }
                let pct = lastDays >= 3 ? 100 : (lastDays === 2 ? 66 : (lastDays === 1 ? 33 : 0));
                let offset = 157 - (157 * pct / 100);
                let color = pct > 66 ? '#00ff88' : (pct > 30 ? '#ffaa00' : '#ff3366');

                container.innerHTML += `
                    <div class="muscle-unit">
                        <div class="circle-box">
                            <svg class="progress-ring"><circle class="progress-ring__circle" stroke="${color}" stroke-width="4" fill="transparent" r="25" cx="30" cy="30" style="stroke-dashoffset: ${offset}"/></svg>
                            <span style="position:absolute; font-size:12px; font-weight:bold">${pct}%</span>
                        </div>
                        <span style="font-size:10px; opacity:0.6; text-transform:uppercase">${m}</span>
                    </div>`;
            });
        }

        // --- TRAIN LOGIC ---
        function renderTrain() {
            const strip = document.getElementById('cal-strip'); strip.innerHTML = '';
            const today = new Date();
            for(let i=-3; i<=3; i++) {
                let d = new Date(); d.setDate(today.getDate() + i);
                let dStr = d.toISOString().split('T')[0];
                strip.innerHTML += `<div class="cal-dot ${dStr === state.viewDate ? 'active' : ''} ${state.workouts[dStr]?.length ? 'has-event' : ''}" onclick="state.viewDate='${dStr}'; save();">${d.getDate()}</div>`;
            }
            document.getElementById('selected-date-label').innerText = state.viewDate === today.toISOString().split('T')[0] ? "Сегодня" : state.viewDate;

            const list = state.workouts[state.viewDate] || [];
            document.getElementById('workout-container').innerHTML = list.map((ex, i) => `
                <div class="glass-card">
                    <div style="display:flex; justify-content:space-between">
                        <div><span class="sub-text">${ex.muscle}</span><h1>${ex.name}</h1></div>
                        <span onclick="state.workouts['${state.viewDate}'].splice(${i},1); save();">✕</span>
                    </div>
                    ${ex.sets.map(s => `<div style="margin-top:8px; font-family:monospace">${s.w}kg × ${s.r}</div>`).join('')}
                </div>`).join('');
        }

        // --- BODY LOGIC ---
        function setGoal(v) { state.weightGoal = parseFloat(v); save(); }
        function saveWeight() {
            const d = document.getElementById('w-date').value;
            const v = parseFloat(document.getElementById('w-val').value);
            if(d && v) { state.weightLogs[d] = v; save(); }
        }
        function renderBody() {
            const logs = Object.keys(state.weightLogs).sort();
            const lastW = state.weightLogs[logs[logs.length-1]] || 0;
            document.getElementById('cur-weight-display').innerText = lastW + " kg";
            document.getElementById('goal-weight-display').innerText = "Цель: " + state.weightGoal + " kg";
            
            if(state.weightGoal > 0) {
                let p = (lastW / state.weightGoal) * 100;
                document.getElementById('goal-fill').style.width = Math.min(p, 100) + "%";
            }

            document.getElementById('weight-history').innerHTML = Object.keys(state.weightLogs).sort().reverse().map(d => `
                <div class="glass-card" style="display:flex; justify-content:space-between; margin: 0 0 10px 0; padding:15px">
                    <span>${d}</span><b>${state.weightLogs[d]} kg</b>
                    <span style="color:#ff3366" onclick="delete state.weightLogs['${d}']; save();">✕</span>
                </div>`).join('');

            renderChart(logs);
        }

        let chartInst = null;
        function renderChart(labels) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if(chartInst) chartInst.destroy();
            chartInst = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ data: labels.map(l => state.weightLogs[l]), borderColor: '#00f2ff', tension: 0.4, borderShadowBlur: 10 }] },
                options: { plugins: { legend: {display: false} }, scales: { y: { display: false }, x: { ticks: {color: 'rgba(255,255,255,0.3)'} } } }
            });
        }

        // --- RANDOMIZER ---
        function updateRndList() {
            const m = document.getElementById('rnd-muscle').value;
            document.getElementById('rnd-config-list').innerHTML = (state.rndData[m] || []).map((ex, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px">
                    <span>${ex}</span><span style="color:#ff3366" onclick="state.rndData['${m}'].splice(${i},1); save();">✕</span>
                </div>`).join('');
        }
        function addRndEx() {
            const m = document.getElementById('rnd-muscle').value;
            const n = document.getElementById('rnd-new-name').value;
            if(n) { state.rndData[m].push(n); document.getElementById('rnd-new-name').value = ''; save(); }
        }
        function spinRnd() {
            const m = document.getElementById('rnd-muscle').value;
            const items = state.rndData[m];
            if(!items?.length) return;
            tg.HapticFeedback.impactOccurred('medium');
            let i = 0;
            let timer = setInterval(() => {
                document.getElementById('rnd-result').innerText = items[Math.floor(Math.random()*items.length)];
                if(i++ > 10) clearInterval(timer);
            }, 50);
        }

        // --- MODALS ---
        function openModal(type) {
            const cont = document.getElementById('modal-content');
            if(type === 'workout') {
                cont.innerHTML = `<h1>Упражнение</h1>
                    <select id="m-m" class="input-box">${MUSCLES.map(m => `<option>${m}</option>`).join('')}</select>
                    <input type="text" id="m-n" class="input-box" placeholder="Название" style="margin:10px 0">
                    <div id="m-sets"></div>
                    <button class="btn" style="width:100%" onclick="addMSet()">+ Подход</button>
                    <button class="btn btn-accent" style="width:100%; margin-top:15px" onclick="saveEx()">Добавить</button>
                    <button class="btn" style="width:100%; margin-top:10px" onclick="closeModal()">Отмена</button>`;
            } else if(type === 'pb') {
                cont.innerHTML = `<h1>Новый рекорд</h1>
                    <input type="text" id="pb-n" class="input-box" placeholder="Упражнение">
                    <input type="number" id="pb-w" class="input-box" placeholder="Вес (кг)" style="margin:10px 0">
                    <button class="btn btn-accent" style="width:100%" onclick="savePB()">Записать в историю</button>
                    <button class="btn" style="width:100%; margin-top:10px" onclick="closeModal()">Закрыть</button>`;
            }
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function addMSet() { document.getElementById('m-sets').innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px"><input type="number" class="input-box sw" placeholder="кг"><input type="number" class="input-box sr" placeholder="раз"></div>`; }
        function saveEx() {
            const muscle = document.getElementById('m-m').value;
            const name = document.getElementById('m-n').value;
            const sets = Array.from(document.querySelectorAll('#m-sets > div')).map(d => ({ w: d.querySelector('.sw').value, r: d.querySelector('.sr').value }));
            if(!state.workouts[state.viewDate]) state.workouts[state.viewDate] = [];
            state.workouts[state.viewDate].push({ muscle, name, sets });
            save(); closeModal();
        }
        function savePB() {
            const name = document.getElementById('pb-n').value;
            const weight = document.getElementById('pb-w').value;
            if(name && weight) { state.pbVault.push({ name, weight, date: new Date().toLocaleDateString() }); save(); closeModal(); }
        }

        // --- CORE UI ---
        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
        }
        function renderAll() {
            renderRecovery(); renderTrain(); renderBody(); updateRndList();
            document.getElementById('pb-list').innerHTML = state.pbVault.slice(-3).reverse().map(p => `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                    <span>${p.name}</span><span class="record-badge">${p.weight} KG</span>
                </div>`).join('');
        }
    </script>
</body>
</html>
