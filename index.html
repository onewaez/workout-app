<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color); /* Берем цвет фона из ТГ */
            color: var(--tg-theme-text-color);         /* Цвет текста из ТГ */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 id="user-name">Привет!</h1>
    <p>Это твое расписание тренировок.</p>
    <button id="main-btn">Начать тренировку</button>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на весь экран

        // Выводим имя пользователя
        document.getElementById('user-name').innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;

        // Кнопка просто для проверки
        document.getElementById('main-btn').addEventListener('click', () => {
            tg.showAlert("Тренировка началась! Погнали!");
        });
    </script>
</body>
</html>
