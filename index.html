<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA | Athletic OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;          /* Абсолютный черный (OLED) */
            --surface: #0a0a0c;     /* Почти черный для карточек */
            --border: #1f1f22;      /* Очень тонкие границы */
            --text-main: #ffffff;   
            --text-dim: #8b8b93;    
            
            /* Функциональные цвета стартапа */
            --green: #00ff66;       
            --red: #ff3333;         
            --orange: #ffaa00;      
            --accent: #ffffff;      
        }

        body { 
            margin: 0; padding: 0; padding-bottom: 100px; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            background-color: var(--bg); color: var(--text-main); 
            -webkit-user-select: none; user-select: none;
            letter-spacing: -0.3px;
        }

        /* Премиум Карточки */
        .card { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 20px; padding: 24px; margin: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }

        h1 { font-size: 28px; font-weight: 700; margin: 0 0 5px 0; letter-spacing: -1px; }
        h2, h3 { margin: 0 0 15px 0; font-weight: 600; }
        .text-dim { color: var(--text-dim); font-size: 14px; font-weight: 500; }

        /* Кнопки */
        .btn { 
            background: var(--text-main); color: var(--bg); 
            border: none; padding: 16px; 
            border-radius: 14px; width: 100%; font-weight: 700; 
            font-size: 16px; cursor: pointer; transition: transform 0.2s, opacity 0.2s; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-green { background: var(--green); color: #000; box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); }
        .btn-red { background: rgba(255, 51, 51, 0.1); color: var(--red); border: 1px solid var(--red); }
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border); }

        /* Инпуты */
        .input-box { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: var(--text-main); padding: 16px; border-radius: 14px; 
            margin-bottom: 12px; box-sizing: border-box; font-size: 16px; outline: none; 
            transition: border 0.3s;
        }
        .input-box:focus { border-color: var(--green); }

        /* Навигация (Floating style) */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(10, 10, 12, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); display: flex; 
            justify-content: space-around; align-items: center; 
            height: 70px; border-radius: 35px; z-index: 2000; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); cursor: pointer; transition: 0.3s ease; padding: 10px; }
        .nav-item.active { color: var(--text-main); transform: translateY(-3px); }
        .nav-icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }

        /* === БИОМЕТРИЧЕСКИЕ КОЛЬЦА (Вместо SVG) === */
        .bio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .bio-card { 
            background: var(--bg); border: 1px solid var(--border); 
            border-radius: 16px; padding: 16px; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        
        /* Само кольцо на CSS */
        .ring-container { 
            position: relative; width: 70px; height: 70px; 
            border-radius: 50%; margin-bottom: 12px;
            /* Градиент формируется через JS */
            background: conic-gradient(var(--green) 100%, #1a1a1a 0);
            display: flex; justify-content: center; align-items: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ring-inner { 
            position: absolute; width: 58px; height: 58px; 
            background: var(--bg); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            font-weight: 700; font-size: 16px;
        }
        .muscle-name { font-weight: 600; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .muscle-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; }
        
        .status-optimal { color: var(--green); background: rgba(0,255,102,0.1); }
        .status-recovering { color: var(--orange); background: rgba(255,170,0,0.1); }
        .status-fatigued { color: var(--red); background: rgba(255,51,51,0.1); box-shadow: 0 0 15px rgba(255,51,51,0.2); }

        /* Списки и Календарь */
        .row-between { display: flex; justify-content: space-between; align-items: center; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 18px; font-weight: 700; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-day { 
            text-align: center; padding: 14px 0; border-radius: 12px; 
            background: var(--surface); font-size: 16px; font-weight: 600; cursor: pointer; 
            border: 1px solid var(--border); color: var(--text-dim);
        }
        .cal-day.selected { border-color: var(--text-main); background: var(--text-main); color: var(--bg); }
        .cal-day.has-workout::after { content: ''; display: block; width: 6px; height: 6px; background: var(--green); border-radius: 50%; margin: 4px auto 0; box-shadow: 0 0 8px var(--green); }
        .cal-day.selected.has-workout::after { background: var(--bg); box-shadow: none; }

        .workout-card { background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 16px; margin-bottom: 12px; }
        .set-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
        .set-row:last-child { border-bottom: none; padding-bottom: 0; }
        
        .check-box { width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 8px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .check-box.done { background: var(--green); border-color: var(--green); box-shadow: 0 0 15px rgba(0,255,102,0.3); }
        .check-box.done::after { content: "✓"; color: #000; font-weight: 800; }

        .del-btn { color: var(--red); font-weight: bold; font-size: 18px; padding: 5px; cursor: pointer; }

        /* Страницы и Модалки */
        .page { display: none; padding-top: 20px; } 
        .page.active { display: block; animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; overflow-y: auto; padding-top: 40px; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div style="padding: 0 20px;">
            <p class="text-dim" style="text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;">AURA OS v2.0</p>
            <h1>Статус системы</h1>
            
            <div class="bio-grid" id="bio-dashboard">
                </div>
        </div>

        <div class="card" style="margin-top: 30px;">
            <h3>Анализ 1ПМ</h3>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="orm-w" class="input-box" placeholder="Масса (кг)" inputmode="decimal">
                <input type="number" id="orm-r" class="input-box" placeholder="Повторения" inputmode="numeric">
            </div>
            <button class="btn btn-outline" onclick="calcRM()">Анализировать</button>
            <h2 id="rm-res" style="text-align: center; margin-top: 20px; color: var(--green); font-size: 32px; display: none;"></h2>
        </div>
    </div>

    <div id="plan" class="page">
        <div style="padding: 0 20px;">
            <div class="cal-header">
                <span onclick="shiftMonth(-1)" style="cursor:pointer; padding:10px;">←</span>
                <span id="month-label">Месяц</span>
                <span onclick="shiftMonth(1)" style="cursor:pointer; padding:10px;">→</span>
            </div>
            <div id="calendar" class="cal-grid"></div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <div class="row-between" style="margin-bottom: 20px;">
                <h2 id="date-label" style="margin:0;">Протокол</h2>
                <span class="text-dim" style="cursor:pointer; text-decoration: underline;" onclick="nav('presets')">Шаблоны</span>
            </div>
            <div id="workout-list"></div>
            <button class="btn btn-green" style="margin-top: 20px;" onclick="openModal('plan')">+ Блок упражнения</button>
        </div>
    </div>

    <div id="presets" class="page">
        <div class="card">
            <h2>Архив шаблонов</h2>
            <input type="text" id="preset-name" class="input-box" placeholder="Идентификатор шаблона">
            <button class="btn btn-outline" onclick="addPreset()">Сохранить в базу</button>
        </div>
        <div id="presets-list" style="padding: 0 16px;"></div>
    </div>

    <div id="stats" class="page">
        <div class="card">
            <h2>Масса тела</h2>
            <canvas id="chartCanvas" style="margin-bottom: 25px;"></canvas>
            <input type="number" id="stat-w" class="input-box" placeholder="Фиксация массы (кг)" inputmode="decimal">
            <button class="btn btn-green" onclick="addWeight()">Записать данные</button>
        </div>
        <div class="card">
            <h3 class="text-dim" style="text-transform: uppercase;">Лог изменений</h3>
            <div id="weight-history"></div>
        </div>
    </div>

    <div id="random" class="page">
        <div class="card" style="text-align: center;">
            <h2>Вектор нагрузки</h2>
            <p class="text-dim">Случайная генерация паттерна</p>
            <select id="wheel-m" class="input-box" onchange="drawWheel()"></select>
            
            <div style="position: relative; width: 280px; height: 280px; margin: 40px auto;">
                <div style="position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--text-main); z-index: 10;"></div>
                <canvas id="wheelCanvas" width="280" height="280" style="border-radius: 50%; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 40px rgba(0,255,102,0.1);"></canvas>
            </div>
            <button class="btn btn-outline" onclick="spinWheel()">Инициализировать спин</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('home', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div class="nav-item" onclick="nav('plan', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="nav-item" onclick="nav('stats', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div class="nav-item" onclick="nav('random', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
    </nav>

    <div id="modal" class="modal">
        <div class="card" style="margin-top: 20px;">
            <h2>Конфигурация</h2>
            <select id="m-muscle" class="input-box"></select>
            <input type="text" id="m-name" class="input-box" placeholder="Паттерн движения (Жим, Тяга...)">
            
            <div id="m-sets" style="margin: 20px 0;"></div>
            <button class="btn btn-outline" style="margin-bottom: 20px;" onclick="addModalSet()">+ Добавить сет</button>
            
            <button class="btn btn-green" onclick="saveEx()">Подтвердить</button>
            <button class="btn btn-red" style="margin-top: 15px;" onclick="closeModal()">Прервать</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        
        // Новая база мышц без привязки к SVG
        const MUSCLES = ["Грудь", "Спина", "Ноги", "Плечи", "Бицепс", "Трицепс", "Пресс"];

        let state = {
            date: new Date().toISOString().split('T')[0],
            monthDate: new Date(),
            workouts: {}, presets: [], weights: [],
            wheelData: { "Грудь": ["Жим лежа", "Брусья"], "Спина": ["Подтягивания", "Тяга в наклоне"], "Ноги": ["Присед", "Выпады"], "Плечи": ["Армейский жим"], "Бицепс": ["ПШБ"], "Трицепс": ["Французский жим"], "Пресс": ["Скручивания"] }
        };

        let tempSets = []; let modalCtx = { type: null, id: null };
        let wheelRot = 0; let chartInst = null;

        window.onload = () => {
            MUSCLES.forEach(m => {
                document.getElementById('m-muscle').innerHTML += `<option value="${m}">${m}</option>`;
                if(state.wheelData[m]) document.getElementById('wheel-m').innerHTML += `<option value="${m}">${m}</option>`;
            });

            tg.CloudStorage.getItem('auraOS', (err, val) => {
                if(!err && val) { state = {...state, ...JSON.parse(val)}; state.monthDate = new Date(); }
                renderUI();
            });
        };

        function save() { tg.CloudStorage.setItem('auraOS', JSON.stringify(state)); updateBioRings(); }

        // === ГЛАВНАЯ МАГИЯ: БИОМЕТРИЧЕСКИЕ КОЛЬЦА ВОССТАНОВЛЕНИЯ ===
        function updateBioRings() {
            const grid = document.getElementById('bio-dashboard');
            grid.innerHTML = '';
            
            const today = new Date();
            today.setHours(0,0,0,0);

            MUSCLES.forEach(muscle => {
                let recoveryPct = 100; // По умолчанию восстановлен
                let statusClass = 'status-optimal';
                let statusText = 'ОПТИМАЛЬНО';
                let color = 'var(--green)';

                // Ищем когда последний раз тренировали эту мышцу
                let lastTrainedDaysAgo = 999;
                
                // Проходим по всем датам тренировок
                for (let dateStr in state.workouts) {
                    const hasMuscle = state.workouts[dateStr].some(ex => ex.muscle === muscle);
                    if(hasMuscle) {
                        const wDate = new Date(dateStr);
                        const diffTime = Math.abs(today - wDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        if(diffDays < lastTrainedDaysAgo) lastTrainedDaysAgo = diffDays;
                    }
                }

                // Расчет восстановления:
                if (lastTrainedDaysAgo === 0) {
                    recoveryPct = 0; // Тренировал сегодня
                    statusClass = 'status-fatigued';
                    statusText = 'ИСТОЩЕНО';
                    color = 'var(--red)';
                } else if (lastTrainedDaysAgo === 1) {
                    recoveryPct = 40; // Вчера
                    statusClass = 'status-recovering';
                    statusText = 'РЕГЕНЕРАЦИЯ';
                    color = 'var(--orange)';
                } else if (lastTrainedDaysAgo === 2) {
                    recoveryPct = 75; // Позавчера (Почти готов)
                    statusClass = 'status-optimal';
                    statusText = 'ГОТОВНОСТЬ';
                    color = 'var(--green)';
                }

                // Рисуем карточку
                grid.innerHTML += `
                    <div class="bio-card">
                        <div class="ring-container" style="background: conic-gradient(${color} ${recoveryPct}%, #1a1a1a 0);">
                            <div class="ring-inner" style="color: ${color}">${recoveryPct}%</div>
                        </div>
                        <div class="muscle-name">${muscle}</div>
                        <div class="muscle-status ${statusClass}">${statusText}</div>
                    </div>
                `;
            });
        }

        // --- НАВИГАЦИЯ ---
        function nav(page, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
            renderUI();
        }

        // --- ПЛАН И ПОДХОДЫ ---
        function toggleSet(exI, sI) {
            state.workouts[state.date][exI].sets[sI].done = !state.workouts[state.date][exI].sets[sI].done;
            tg.HapticFeedback.selectionChanged();
            save(); renderPlan();
        }

        function renderPlan() {
            const c = document.getElementById('workout-list'); c.innerHTML = '';
            const list = state.workouts[state.date] || [];
            if(!list.length) c.innerHTML = "<p class='text-dim' style='text-align:center;'>Нет активных протоколов на сегодня</p>";
            
            list.forEach((ex, exI) => {
                let h = `<div class="workout-card">
                    <div class="row-between" style="margin-bottom:15px;">
                        <div>
                            <span class="text-dim" style="font-size:12px; text-transform:uppercase;">${ex.muscle}</span>
                            <div style="font-size:18px; font-weight:700;">${ex.name}</div>
                        </div>
                        <span class="del-btn" onclick="delEx(${exI})">✕</span>
                    </div>`;
                ex.sets.forEach((s, sI) => {
                    h += `<div class="set-row" onclick="toggleSet(${exI}, ${sI})">
                        <span style="font-size:18px; font-weight:600; font-family:monospace;">${s.w} <span class="text-dim">kg</span> × ${s.r}</span>
                        <div class="check-box ${s.done ? 'done' : ''}"></div>
                    </div>`;
                });
                c.innerHTML += h + `</div>`;
            });
        }
        function delEx(i) { state.workouts[state.date].splice(i, 1); save(); renderPlan(); renderCal(); }

        // --- КАЛЕНДАРЬ ---
        function shiftMonth(dir) { state.monthDate.setMonth(state.monthDate.getMonth() + dir); renderCal(); }
        function renderCal() {
            const grid = document.getElementById('calendar'); grid.innerHTML = '';
            const m = state.monthDate.getMonth(), y = state.monthDate.getFullYear();
            document.getElementById('month-label').innerText = new Intl.DateTimeFormat('ru', {month:'long', year:'numeric'}).format(state.monthDate);
            
            let fd = new Date(y, m, 1).getDay(); fd = fd === 0 ? 6 : fd - 1;
            let days = new Date(y, m + 1, 0).getDate();

            for(let i=0; i<fd; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const el = document.createElement('div');
                let cl = `cal-day`;
                if(dStr === state.date) cl += ` selected`;
                if(state.workouts[dStr] && state.workouts[dStr].length > 0) cl += ` has-workout`;
                
                el.className = cl;
                el.innerText = d;
                el.onclick = () => { state.date = dStr; renderUI(); };
                grid.appendChild(el);
            }
            document.getElementById('date-label').innerText = `Протокол: ${state.date}`;
        }

        // --- ШАБЛОНЫ ---
        function addPreset() {
            const n = document.getElementById('preset-name').value;
            if(n) { state.presets.push({ id: Date.now(), name: n, ex: [] }); document.getElementById('preset-name').value = ''; save(); renderPresets(); }
        }
        function renderPresets() {
            const c = document.getElementById('presets-list'); c.innerHTML = '';
            state.presets.forEach((p, i) => {
                let h = `<div class="workout-card"><h2 style="color:var(--green); text-transform:uppercase;">${p.name}</h2>`;
                p.ex.forEach(e => h += `<div class="text-dim" style="margin-bottom:8px;">• ${e.name}</div>`);
                h += `<div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn btn-outline" style="padding:12px; font-size:14px;" onclick="openModal('preset', ${p.id})">+ Добавить</button>
                    <button class="btn btn-green" style="padding:12px; font-size:14px; box-shadow:none;" onclick="usePreset(${p.id})">Интегрировать</button>
                    <button class="btn btn-red" style="padding:12px; width:60px;" onclick="state.presets.splice(${i},1); save(); renderPresets()">✕</button>
                </div></div>`;
                c.innerHTML += h;
            });
        }
        function usePreset(id) {
            const p = state.presets.find(x => x.id === id);
            if(!state.workouts[state.date]) state.workouts[state.date] = [];
            state.workouts[state.date].push(...JSON.parse(JSON.stringify(p.ex)));
            save(); nav('plan');
        }

        // --- МОДАЛКА УПРАЖНЕНИЙ ---
        function openModal(type, id = null) {
            modalCtx = { type, id }; tempSets = [{w: 0, r: 0}]; 
            document.getElementById('m-name').value = ''; renderModSets();
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function addModalSet() { tempSets.push({w: 0, r: 0}); renderModSets(); }
        function renderModSets() {
            document.getElementById('m-sets').innerHTML = tempSets.map((s, i) => `
                <div style="display:flex; gap:15px; margin-bottom:15px;">
                    <input type="number" class="input-box" style="margin:0" value="${s.w||''}" onchange="tempSets[${i}].w=this.value" placeholder="Масса (кг)">
                    <input type="number" class="input-box" style="margin:0" value="${s.r||''}" onchange="tempSets[${i}].r=this.value" placeholder="Повторения">
                </div>
            `).join('');
        }
        function saveEx() {
            const m = document.getElementById('m-muscle').value;
            const n = document.getElementById('m-name').value;
            if(!n) return;
            const ex = { muscle: m, name: n, sets: tempSets.map(s => ({...s, done: false})) };
            if(modalCtx.type === 'plan') {
                if(!state.workouts[state.date]) state.workouts[state.date] = [];
                state.workouts[state.date].push(ex);
            } else {
                state.presets.find(p => p.id === modalCtx.id).ex.push(ex);
            }
            save(); closeModal(); renderUI();
        }

        // --- УТИЛИТЫ ---
        function calcRM() {
            const w = parseFloat(document.getElementById('orm-w').value);
            const r = parseFloat(document.getElementById('orm-r').value);
            const res = document.getElementById('rm-res');
            if(w && r) { res.innerText = `${Math.round(w * (1 + r/30))} kg`; res.style.display = 'block'; }
        }

        function addWeight() {
            const v = parseFloat(document.getElementById('stat-w').value);
            if(v) { state.weights.push({ d: new Date().toLocaleDateString(), v }); save(); renderStats(); }
        }
        function renderStats() {
            const h = document.getElementById('weight-history'); h.innerHTML = '';
            state.weights.slice(-5).reverse().forEach(w => h.innerHTML += `<div class="set-row"><span class="text-dim" style="font-family:monospace;">${w.d}</span><b style="color:var(--text-main); font-size:20px;">${w.v} kg</b></div>`);
            
            if(chartInst) chartInst.destroy();
            Chart.defaults.color = '#8b8b93';
            Chart.defaults.font.family = 'monospace';
            chartInst = new Chart(document.getElementById('chartCanvas'), {
                type: 'line',
                data: { labels: state.weights.map(x => x.d), datasets: [{ label: 'Масса', data: state.weights.map(x => x.v), borderColor: '#00ff66', backgroundColor: 'rgba(0, 255, 102, 0.1)', fill: true, tension: 0.4, borderWidth: 3 }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#1f1f22' } }, y: { grid: { color: '#1f1f22' } } } }
            });
        }

        // --- ЛАБОРАТОРИЯ ВОССТАНОВЛЕНИЯ (Колесо) ---
        function drawWheel() {
            const m = document.getElementById('wheel-m').value;
            const items = state.wheelData[m] || [];
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const r = 140; ctx.clearRect(0,0,280,280);
            
            if(!items.length) return;
            const arc = (Math.PI * 2) / items.length;
            items.forEach((text, i) => {
                ctx.beginPath(); ctx.fillStyle = i % 2 === 0 ? '#00ff66' : '#00cc52';
                ctx.moveTo(r, r); ctx.arc(r, r, r, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(r, r); ctx.rotate(i*arc + arc/2);
                ctx.fillStyle = '#000'; ctx.font = '800 14px sans-serif';
                ctx.fillText(text.slice(0, 15).toUpperCase(), 60, 5); ctx.restore();
            });
        }
        function spinWheel() {
            wheelRot += 1800 + Math.random() * 360;
            document.getElementById('wheelCanvas').style.transform = `rotate(${wheelRot}deg)`;
            tg.HapticFeedback.impactOccurred('rigid');
        }

        function renderUI() {
            renderCal(); renderPlan(); renderPresets(); renderStats(); drawWheel(); updateBioRings();
        }
    </script>
</body>
</html>
